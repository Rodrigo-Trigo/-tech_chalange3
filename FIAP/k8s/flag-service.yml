apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-service
  namespace: flag-service-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flag-service
  template:
    metadata:
      labels:
        app: flag-service
    spec:
      containers:
      - name: flag-service
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/flag-service:latest
        ports:
        - containerPort: 8002
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: DATABASE_URL
        - name: PORT
          value: "8002"
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: service-urls
              key: AUTH_SERVICE_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: flag-service
  namespace: flag-service-ns
spec:
  selector:
    app: flag-service
  ports:
  - port: 8002
    targetPort: 8002
  type: ClusterIP